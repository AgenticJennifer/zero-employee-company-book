model_type: xgboost
target: target_support
geographic_scope: all_counties

# XGBoost hyperparameters
n_estimators: 300
max_depth: 6
learning_rate: 0.05
subsample: 0.8
colsample_bytree: 0.8
scale_pos_weight: 2.3  # ~1/positive_rate compensates for 30% class imbalance

# Training setup
random_seed: 42
train_split: 0.8
val_split: 0.1
